<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Times Practice</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 1-15.38 6.36M3 12A9 9 0 0 1 18.38 5.64"></path>
        <path d="M21 4v6h-6"></path>
        <path d="M3 20v-6h6"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m20 6-11 11-5-5"></path>
      </symbol>
      <symbol id="icon-undo" viewBox="0 0 24 24">
        <path d="M9 14 4 9l5-5"></path>
        <path d="M4 9h10a6 6 0 0 1 0 12h-1"></path>
      </symbol>
      <symbol id="icon-eraser" viewBox="0 0 24 24">
        <path d="m7 21-4-4a2.8 2.8 0 0 1 0-4l8.5-8.5a2.8 2.8 0 0 1 4 0l5.5 5.5a2.8 2.8 0 0 1 0 4L14 21"></path>
        <path d="M7 21h14"></path>
        <path d="m12 8 7 7"></path>
      </symbol>
      <symbol id="icon-pencil" viewBox="0 0 24 24">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M6 6l1 15h10l1-15"></path>
      </symbol>
      <symbol id="icon-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="icon-right" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6"></path>
      </symbol>
      <symbol id="icon-backspace" viewBox="0 0 24 24">
        <path d="M21 5H8l-6 7 6 7h13Z"></path>
        <path d="m18 9-6 6"></path>
        <path d="m12 9 6 6"></path>
      </symbol>
    </svg>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Times Practice</h1>
          <p class="session-status" id="sessionStatus">Ready</p>
        </div>

        <div class="top-actions" aria-label="Worksheet actions">
          <button class="button secondary" id="newSetButton" type="button">
            <svg class="icon" aria-hidden="true"><use href="#icon-refresh"></use></svg>
            New Set
          </button>
          <button class="button primary" id="checkSetButton" type="button">
            <svg class="icon" aria-hidden="true"><use href="#icon-check"></use></svg>
            Check Set
          </button>
        </div>
      </header>

      <section class="settings-bar" aria-label="Practice settings">
        <div class="control-group">
          <span class="control-label" id="modeLabel">Problems</span>
          <div class="segmented-control" role="group" aria-labelledby="modeLabel">
            <button type="button" class="segment" data-mode="mix" aria-pressed="true">Mix</button>
            <button type="button" class="segment" data-mode="2x1" aria-pressed="false">2 x 1</button>
            <button type="button" class="segment" data-mode="1x2" aria-pressed="false">1 x 2</button>
            <button type="button" class="segment" data-mode="2x2" aria-pressed="false">2 x 2</button>
          </div>
        </div>

        <label class="select-control">
          <span class="control-label">Count</span>
          <select id="countSelect">
            <option value="6">6</option>
            <option value="10" selected>10</option>
            <option value="12">12</option>
            <option value="16">16</option>
          </select>
        </label>
      </section>

      <section class="practice-layout">
        <aside class="problem-list" aria-label="Problem list">
          <div class="list-header">
            <span id="listTitle">Set</span>
            <strong id="scoreBadge">0 / 10</strong>
          </div>
          <div class="problem-grid" id="problemGrid"></div>
        </aside>

        <section class="workspace" aria-label="Current problem">
          <div class="problem-panel">
            <div class="problem-header">
              <button class="icon-button" id="previousButton" type="button" aria-label="Previous problem" title="Previous problem">
                <svg class="icon" aria-hidden="true"><use href="#icon-left"></use></svg>
              </button>
              <div class="problem-counter" id="problemCounter">Problem 1 of 10</div>
              <button class="icon-button" id="nextButton" type="button" aria-label="Next problem" title="Next problem">
                <svg class="icon" aria-hidden="true"><use href="#icon-right"></use></svg>
              </button>
            </div>

            <div class="problem-main">
              <div class="vertical-problem" aria-live="polite">
                <div class="operand top" id="leftOperand">42</div>
                <div class="operand multiplier"><span aria-hidden="true">&times;</span><span id="rightOperand">6</span></div>
                <div class="answer-line"></div>
              </div>

              <div class="answer-box">
                <label for="answerInput">Answer</label>
                <input id="answerInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
                <div class="feedback" id="feedback" aria-live="polite"></div>
              </div>
            </div>
          </div>

          <div class="scratch-panel">
            <div class="scratch-toolbar" aria-label="Scratch tools">
              <div class="tool-toggle" role="group" aria-label="Drawing tool">
                <button class="icon-button active" id="pencilButton" type="button" aria-pressed="true" aria-label="Pencil" title="Pencil">
                  <svg class="icon" aria-hidden="true"><use href="#icon-pencil"></use></svg>
                </button>
                <button class="icon-button" id="eraserButton" type="button" aria-pressed="false" aria-label="Eraser" title="Eraser">
                  <svg class="icon" aria-hidden="true"><use href="#icon-eraser"></use></svg>
                </button>
              </div>

              <div class="scratch-actions">
                <button class="icon-button" id="undoButton" type="button" aria-label="Undo" title="Undo">
                  <svg class="icon" aria-hidden="true"><use href="#icon-undo"></use></svg>
                </button>
                <button class="icon-button" id="clearScratchButton" type="button" aria-label="Clear work" title="Clear work">
                  <svg class="icon" aria-hidden="true"><use href="#icon-trash"></use></svg>
                </button>
              </div>
            </div>

            <canvas id="scratchCanvas" width="1000" height="650" aria-label="Scratch work area"></canvas>
          </div>
        </section>

        <aside class="keypad-panel" aria-label="Answer keypad">
          <div class="keypad" id="keypad">
            <button type="button" data-key="7">7</button>
            <button type="button" data-key="8">8</button>
            <button type="button" data-key="9">9</button>
            <button type="button" data-key="4">4</button>
            <button type="button" data-key="5">5</button>
            <button type="button" data-key="6">6</button>
            <button type="button" data-key="1">1</button>
            <button type="button" data-key="2">2</button>
            <button type="button" data-key="3">3</button>
            <button type="button" data-action="clear">Clear</button>
            <button type="button" data-key="0">0</button>
            <button type="button" data-action="backspace" aria-label="Backspace" title="Backspace">
              <svg class="icon" aria-hidden="true"><use href="#icon-backspace"></use></svg>
            </button>
          </div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
